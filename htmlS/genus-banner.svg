<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 220" role="img" aria-label="Genus — der, die, das">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5d6fc2"/>
      <stop offset="1" stop-color="#6a4a92"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="220" fill="url(#bg)"/>

  <!-- dezente Hairline-Rahmung -->
  <rect x="24" y="24" width="952" height="172" rx="6" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>

  <!-- Kicker: kleine, gesperrte Versalien -->
  <text x="500" y="72" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="15" font-weight="600" letter-spacing="7" fill="#ffffff" fill-opacity="0.78">GENUS&#160;&#160;&#183;&#160;&#160;ARTIKEL BESTIMMEN</text>

  <!-- Hauptzeile: ruhige Serif -->
  <text x="320" y="148" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="66" fill="#ffffff">der</text>
  <text x="500" y="148" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="66" fill="#ffffff">die</text>
  <text x="680" y="148" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="66" fill="#ffffff">das</text>

  <!-- dezente Farbakzente unter jedem Artikel -->
  <rect x="289" y="166" width="62" height="3" rx="1.5" fill="#7ea2e6"/>
  <rect x="469" y="166" width="62" height="3" rx="1.5" fill="#d98cae"/>
  <rect x="649" y="166" width="62" height="3" rx="1.5" fill="#86cbab"/>
</svg>
