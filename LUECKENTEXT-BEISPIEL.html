<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lückentext — Referenz-Lektion (A2)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
.container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
.header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
.header h1 { font-size: 2.2em; font-family: Georgia, 'Times New Roman', serif; color: white; margin-bottom: 8px; }
.header p { font-size: 1.1em; font-family: Georgia, 'Times New Roman', serif; color: rgba(255,255,255,0.9); margin: 0; }
.header .big-emoji { font-size: 2.6em; display: block; margin-top: 8px; }
.nav { display: flex; flex-wrap: nowrap; background: #f8f9fa; border-top: 1px solid #ddd; border-left: 1px solid #ddd; border-right: 1px solid #ddd; }
.nav-btn { flex: 1; padding: 14px 10px; text-align: center; cursor: pointer; border-right: 1px solid #ddd; border-bottom: 1px solid #ddd; transition: all 0.3s; font-size: 0.92em; font-weight: 500; color: #666; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.nav-btn:last-child { border-right: none; }
.nav-btn:hover { background: #e9ecef; color: #495057; }
.nav-btn.active { background: white; color: #667eea; font-weight: 600; border-bottom: 3px solid #667eea; }
.nav-emoji { font-size: 1.3em; line-height: 1.2; }
.nav-label { font-size: 0.78em; margin-top: 2px; line-height: 1.2; }
.sec-inner { padding: 28px 30px 34px; }
.section { display: none; }
.section.active { display: block; }
h2 { color: #4a148c; font-size: 1.4em; margin-bottom: 14px; }
.control-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; padding: 6px 12px; background: #f8f9fa; border-radius: 8px; }
.btn-row { display: flex; gap: 6px; }
.btn { background: #f5f7ff; border: 1px solid #c5cff5; border-radius: 8px; padding: 6px 16px; font-size: 0.85em; color: #667eea; cursor: pointer; transition: all 0.15s; font-weight: 500; }
.btn:hover { background: #667eea; color: white; border-color: #667eea; }
.timer-display { display: flex; gap: 14px; font-size: 0.82em; color: #bbb; font-variant-numeric: tabular-nums; }
.hilfe-box { background: #f0f4ff; border-left: 4px solid #667eea; border-radius: 0 8px 8px 0; padding: 14px 18px; margin-bottom: 22px; font-size: 0.9em; color: #444; line-height: 1.6; }

/* ── WORTBANK (visuell, nicht klickbar) — daf-kern §7 ── */
.wortbank-label { font-weight: 700; color: #667eea; font-size: 0.85em; margin-bottom: 8px; }
.wortbank { display: flex; flex-wrap: wrap; gap: 8px; padding: 14px; background: #f0f0f8; border-radius: 10px; min-height: 48px; margin-bottom: 18px; border: 1px dashed #bbb; }
.wortbank-chip { background: white; border: 2px solid #667eea; color: #667eea; padding: 5px 12px; border-radius: 14px; font-weight: 500; font-size: 0.9em; user-select: none; }
.wortbank-chip.used { opacity: 0.35; text-decoration: line-through; }

/* ── LÜCKENTEXT-SÄTZE + Eingabefeld ── */
.ex-card { font-family: Georgia, 'Times New Roman', serif; background: #f8f9ff; border-left: 4px solid #667eea; border-radius: 0 8px 8px 0; padding: 13px 16px; margin-bottom: 10px; font-size: 1.05em; line-height: 1.9; }
input.blank { border: none; border-bottom: 2px solid #c5cae9; background: transparent; padding: 3px 6px; font-family: inherit; font-size: 0.95em; outline: none; transition: all 0.2s; min-width: 4ch; text-align: center; }
input.blank:focus { border-bottom-color: #667eea; }
input.blank.correct { border-bottom-color: #27ae60; background: #e8f8f0; color: #27ae60; font-weight: 700; }
input.blank.wrong { border-bottom-color: #e74c3c; background: #fdeaea; color: #e74c3c; }

.author-footer { text-align: center; margin-top: 10px; padding: 16px; font-size: 0.8rem; color: #aaa; }
.author-footer a { color: #aaa; }
.author-name { font-weight: 700; }
@media (max-width: 600px) { body { padding: 8px; } .nav { flex-wrap: wrap; } .nav-btn { flex: 1 1 50%; } .sec-inner { padding: 18px 16px 24px; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Ein Tag im Büro</h1>
    <p>A2 – Referenz-Lektion · Lückentext</p>
    <div class="big-emoji">✏️</div>
  </div>

  <div class="nav">
    <div class="nav-btn active" onclick="showSection(0)"><span class="nav-emoji">📝</span><span class="nav-label">Wortschatz-Lücken</span></div>
    <div class="nav-btn" onclick="showSection(1)"><span class="nav-emoji">🔧</span><span class="nav-label">Grammatik-Lücken</span></div>
  </div>

  <!-- TAB 0: Wortschatz-Lückentext (Vollform-Wortbank + .used) -->
  <div class="section active" id="sec0">
    <div class="sec-inner">
      <h2>📝 Wortschatz-Lücken</h2>
      <div class="control-bar">
        <div class="btn-row">
          <button class="btn" onclick="showLoesung(0)">Lösungen</button>
          <button class="btn" onclick="resetTab(0)">Neu starten</button>
        </div>
        <div class="timer-display"><span class="current-time">⏱ <span id="timer-0">00:00</span></span><span class="best-time">🏆 <span id="best-0">--:--</span></span></div>
      </div>
      <div class="wortbank" id="wortbank-0"></div>
      <div id="lueckenContainer-0"></div>
    </div>
  </div>

  <!-- TAB 1: Grammatik-Lückentext (Grundform-Wortbank, Lösung wird NICHT gezeigt, kein .used) -->
  <div class="section" id="sec1">
    <div class="sec-inner">
      <h2>🔧 Grammatik-Lücken — Präteritum</h2>
      <div class="control-bar">
        <div class="btn-row">
          <button class="btn" onclick="showLoesung(1)">Lösungen</button>
          <button class="btn" onclick="resetTab(1)">Neu starten</button>
        </div>
        <div class="timer-display"><span class="current-time">⏱ <span id="timer-1">00:00</span></span><span class="best-time">🏆 <span id="best-1">--:--</span></span></div>
      </div>
      <div class="wortbank" id="wortbank-1"></div>
      <div id="lueckenContainer-1"></div>
    </div>
  </div>

  <div class="author-footer"><span class="author-name">&copy; Frank Burkert</span> &middot; DaF-Materialien &middot; <a href="mailto:unterricht@frankburkert-daf.de">unterricht@frankburkert-daf.de</a></div>
</div><!-- /container -->

<script>
/* ===== DATEN ===== */
// Tab 0 — Wortschatz: Wortbank zeigt die VOLLFORMEN (= die Antworten), mit .used
var LUECKEN_0 = [
  { text: 'Am Morgen trinke ich zuerst einen <b>___</b>.', answer: 'Kaffee' },
  { text: 'Ich fahre mit dem <b>___</b> zur Arbeit.', answer: 'Bus' },
  { text: 'Mein Schreibtisch steht in einem großen <b>___</b>.', answer: 'Büro' },
  { text: 'Ich arbeite gern mit meinen <b>___</b> zusammen.', answer: 'Kollegen' },
  { text: 'Um zwölf Uhr mache ich eine <b>___</b>.', answer: 'Mittagspause' },
  { text: 'Nach der Arbeit freue ich mich auf den <b>___</b>.', answer: 'Feierabend' }
];
// Tab 1 — Grammatik: Lücke verlangt die KONJUGIERTE Form; Wortbank zeigt nur GRUNDFORMEN.
var LUECKEN_1 = [
  { text: 'Gestern <b>___</b> ich sehr müde. (sein)', answer: 'war' },
  { text: 'Wir <b>___</b> keine Zeit für das lange Meeting. (haben)', answer: 'hatten' },
  { text: 'Am Abend <b>___</b> ich früh nach Hause. (gehen)', answer: 'ging' },
  { text: 'Sie <b>___</b> mit dem Zug nach Berlin. (fahren)', answer: 'fuhr' },
  { text: 'Ich <b>___</b> am Wochenende einen Ausflug. (machen)', answer: 'machte' },
  { text: 'Er <b>___</b> jeden Tag pünktlich ins Büro. (kommen)', answer: 'kam' }
];
var GRUNDFORMEN_1 = ['sein', 'haben', 'gehen', 'fahren', 'machen', 'kommen'];

/* ===== NAVIGATION ===== */
function showSection(idx) {
  var secs = document.querySelectorAll('.section');
  var btns = document.querySelectorAll('.nav-btn');
  secs.forEach(function(s, i){ s.classList.toggle('active', i === idx); });
  btns.forEach(function(b, i){ b.classList.toggle('active', i === idx); });
  if (idx === 0) initWortbank(0);
  if (idx === 1) initWortbank(1);
}

/* ===== LÜCKENTEXT RENDERN ===== */
function renderLuecken(data, containerId, tabIdx) {
  var c = document.getElementById(containerId);
  c.innerHTML = '';
  data.forEach(function(item) {
    var card = document.createElement('div');
    card.className = 'ex-card';
    var parts = item.text.split('<b>___</b>');
    var inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'blank';
    inp.dataset.answer = item.answer;
    inp.placeholder = '';                               // Placeholder IMMER leer
    inp.style.width = (item.answer.length + 4) + 'ch';  // dynamische ch-Breite, keine px-Klassen
    inp.autocomplete = 'off'; inp.autocorrect = 'off'; inp.spellcheck = false;
    inp.addEventListener('input', function(){ liveCheck(inp, tabIdx); });
    var span = document.createElement('span');
    span.innerHTML = parts[0];
    card.appendChild(span);
    card.appendChild(inp);
    var after = document.createElement('span');
    after.innerHTML = parts[1] || '';
    card.appendChild(after);
    c.appendChild(card);
  });
}

/* ===== WORTBANK (gemischt, nicht klickbar) ===== */
function shuffle(a) {
  for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; }
  return a;
}
function initWortbank(tabIdx) {
  var bank = document.getElementById('wortbank-' + tabIdx);
  if (!bank) return;
  bank.innerHTML = '';
  var words;
  if (tabIdx === 0) words = LUECKEN_0.map(function(d){ return d.answer; }); // Vollformen
  else words = GRUNDFORMEN_1.slice();                                       // Grundformen
  shuffle(words).forEach(function(w) {
    var chip = document.createElement('span');
    chip.className = 'wortbank-chip';
    chip.textContent = w;                              // KEIN click-Handler — nicht klickbar
    bank.appendChild(chip);
  });
  if (tabIdx === 0) updateWortbankChips(0);            // .used nur im Vollform-Tab
}
function updateWortbankChips(tabIdx) {
  if (tabIdx !== 0) return;                            // Grammatik-Tab: kein .used (Grundform != Lösung)
  var bank = document.getElementById('wortbank-0');
  if (!bank) return;
  var solved = Array.prototype.map.call(
    document.querySelectorAll('#lueckenContainer-0 input.blank.correct'),
    function(i){ return i.value; });
  var remaining = solved.slice();                     // remaining-Liste, KEIN Set (Dubletten korrekt)
  Array.prototype.forEach.call(bank.querySelectorAll('.wortbank-chip'), function(chip){
    var idx = remaining.indexOf(chip.textContent);
    if (idx >= 0) { chip.classList.add('used'); remaining.splice(idx, 1); }
    else { chip.classList.remove('used'); }
  });
}

/* ===== LIVE-FEEDBACK (case-sensitive Präfix-Regel) ===== */
function liveCheck(inp, tabIdx) {
  startTimer(tabIdx);
  var val = inp.value;                 // KEIN trim — Leerzeichen sind Fehler
  var ans = inp.dataset.answer;
  inp.classList.remove('correct', 'wrong');
  if (!val) { updateWortbankChips(tabIdx); return; }  // leer = neutral
  if (val === ans) {                   // exakt = grün
    inp.classList.add('correct');
  } else if (!ans.startsWith(val)) {   // kein korrekter Präfix = rot
    inp.classList.add('wrong');
  }                                    // korrekter Präfix = neutral
  updateWortbankChips(tabIdx);
}

/* ===== BUTTONS ===== */
function showLoesung(tabIdx) {
  var data = tabIdx === 0 ? LUECKEN_0 : LUECKEN_1;
  var inputs = document.querySelectorAll('#lueckenContainer-' + tabIdx + ' input.blank');
  inputs.forEach(function(inp, i){
    inp.value = data[i].answer;
    inp.classList.remove('wrong'); inp.classList.add('correct');
  });
  updateWortbankChips(tabIdx);
  stopTimer(tabIdx);
}
function resetTab(tabIdx) {
  var inputs = document.querySelectorAll('#lueckenContainer-' + tabIdx + ' input.blank');
  inputs.forEach(function(inp){ inp.value=''; inp.classList.remove('correct','wrong'); });
  initWortbank(tabIdx);                 // neu mischen
  resetTimer(tabIdx);
}

/* ===== TIMER (einfach) ===== */
var timers = {};
function startTimer(t){ if (timers[t] && timers[t].id) return; timers[t] = timers[t] || {s:0}; timers[t].id = setInterval(function(){ timers[t].s++; var m=String(Math.floor(timers[t].s/60)).padStart(2,'0'); var s=String(timers[t].s%60).padStart(2,'0'); document.getElementById('timer-'+t).textContent=m+':'+s; },1000); }
function stopTimer(t){ if (timers[t] && timers[t].id){ clearInterval(timers[t].id); timers[t].id=null; } }
function resetTimer(t){ stopTimer(t); if(timers[t]) timers[t].s=0; document.getElementById('timer-'+t).textContent='00:00'; }

/* ===== INIT ===== */
renderLuecken(LUECKEN_0, 'lueckenContainer-0', 0);
renderLuecken(LUECKEN_1, 'lueckenContainer-1', 1);
initWortbank(0);
initWortbank(1);
</script>
</body>
</html>
