# Bekannte, noch nicht behobene Zustände.
# Jeder Eintrag hier ist ein OFFENER PUNKT, den das verify-Skript NICHT als Fehler werten soll,
# solange er hier steht. Wenn er behoben ist, muss er aus dieser Liste entfernt werden.
# Virtuelle Sub-Bereiche, die KEIN eigenes Git-Repo haben, aber als logische Einheit
# im Dashboard und Workflow geführt werden. Werden vom verify-Skript NICHT als Repos geprüft.
virtual_areas:
  c2-bereich:
    level: C2
    parent_repo: daf-b2-uebungen
    local_path: "htmlS/C2"
    remote_url: "https://github.com/fabDaF/daf-b2-uebungen.git"
    pages_url: "https://fabdaf.github.io/daf-b2-uebungen/htmlS/C2/"
    codeberg_via: "Wird automatisch über den daf-b2-uebungen-Mirror mitgespiegelt."
    dashboard_basis: "https://fabdaf.github.io/daf-b2-uebungen/"
    purpose: "C2-Lektionen (Lingoda-Adaption): 10 Einheiten, 72 Lektionen — Sport/Freizeit, Deutschland/Orte, Geschichte, Politik, Geist/Wissenschaft, Welt, Kultur, Beruf, Leben, Bildung."
    rationale: "Historisch gewachsen; bewusst kein eigenes Repo, weil C2 nicht weiter wächst."

known_issues:
  - id: c1_local_subrepo_drift
