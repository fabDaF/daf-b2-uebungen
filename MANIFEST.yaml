# fabDaF MANIFEST — Single Source of Truth
#
# Dieses Dokument beschreibt die SOLL-Welt des fabDaF-Projekts.
# Die IST-Welt lebt in Git, auf GitHub und im Dateisystem.
#
# Bei Abweichungen zwischen SOLL und IST ist die Abweichung der Alarm —
# NICHT das Manifest. Drift muss untersucht und behoben werden.
#
# Prüfung: ./scripts/verify_manifest.sh
# Dokumentation: MANIFEST.md (generiert)
#
# Letzte manuelle Aktualisierung: 2026-04-10
# Konsolidierung abgeschlossen: 2026-04-10 (siehe backup/KONSOLIDIERUNG_20260410.md)

manifest_version: 1
project: fabDaF
description: "Deutsch als Fremdsprache — Unterrichtsmaterialien und interaktive Übungen (Niveau A1–C1)"
root_path_absolute: "~/Cowork/Projekte/fabDaF"
root_path_session: "/sessions/festive-serene-dirac/mnt/fabDaF"

# Grundregeln für die Struktur.
# Jede Verletzung dieser Regeln ist ein Alarm, kein akzeptierter Zustand.
rules:
  - id: one_repo_per_level
    description: "Pro Niveau (A1, A2, B1, B2, C1) existiert genau EIN Repo. Niemals parallele Versionen."
  - id: no_parallel_working_copies
    description: "Keine Ordner wie 'X.1 NEU', 'X.2', 'Kopie' für dasselbe Niveau. Stattdessen Git-Branches oder Archiv."
  - id: archive_is_frozen
    description: "daf-archiv darf nur noch erweitert, nicht mehr verändert werden. Inhalt ist historisch."
  - id: dashboards_point_to_manifest_repos
    description: "Jede basis-URL in einem dashboard.html MUSS auf ein Repo zeigen, das in diesem Manifest als active/materialien/archive gelistet ist."
  - id: no_secrets_in_remote_urls
    description: "Remote-URLs im Manifest enthalten NIE PATs oder Tokens. Die echten URLs in .git/config können PATs enthalten, aber das Manifest bleibt sauber."

# Die neun aktiven Repos.
# Jedes Repo hat: eindeutigen Schlüssel, lokalen Pfad (relativ zu root_path_absolute),
# öffentliche Remote-URL (ohne PAT), erwartete Rolle, Pages-Status, Dashboard-Basis-URL (falls verlinkt),
# Erwartungen für die Verifikation.
repos:

  daf-a1-uebungen:
    role: niveau_active
    level: A1
    local_path: "htmlS/A1.1 NEW"
    remote_url: "https://github.com/fabDaF/daf-a1-uebungen.git"
    github_pages:
      enabled: true
      url: "https://fabdaf.github.io/daf-a1-uebungen/"
    dashboard_basis: "https://fabdaf.github.io/daf-a1-uebungen/"
    purpose: "Aktive A1-Lektionen (ehem. A1-Einstieg + A1 + A1.2 NEW konsolidiert am 2026-04-10)"
