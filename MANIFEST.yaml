    description: "Lokales htmlS/C1/-Sub-Repo hat nur 8 HTML-Dateien, aber das Dashboard verlinkt 161 C1-Lektionen unter https://fabdaf.github.io/daf-c1-uebungen/. Die echte Datenmenge liegt vermutlich nur auf GitHub (Pages serviert sie), nicht lokal. Klären: ist das gewollt (mobiler Hauptarbeitsplatz?) oder fehlt ein Pull?"
    seen_at: 2026-04-29

# Repos, die historisch existiert haben, aber NICHT mehr Teil des Manifests sind.
