<script>
function showSection(n){
  document.querySelectorAll('.section').forEach(function(s,i){ s.classList.toggle('active', i===n); });
  document.querySelectorAll('.nav-btn').forEach(function(b,i){ b.classList.toggle('active', i===n); });
  [1,2,3].forEach(function(i){ timerStop(i); });
}

var TIMER_PREFIX='B2_1068S_';
var timerStarted=[false,false,false,false,false,false,false];
var timerRunning=[false,false,false,false,false,false,false];
var timerSeconds=[0,0,0,0,0,0,0];
var timerIntervals=[null,null,null,null,null,null,null];
function timerAutoStart(n){
  if(timerStarted[n]) return;
  timerStarted[n]=true; timerRunning[n]=true;
  timerIntervals[n]=setInterval(function(){
    timerSeconds[n]++;
    var el=document.getElementById('timer-'+n);
    if(el) el.textContent=fmtTime(timerSeconds[n]);
  },1000);
}
function timerStop(n){
  if(!timerRunning[n]) return;
  clearInterval(timerIntervals[n]); timerRunning[n]=false;
  var best=parseInt(localStorage.getItem(TIMER_PREFIX+n)||'999999');
  if(timerSeconds[n]>0&&timerSeconds[n]<best){
    localStorage.setItem(TIMER_PREFIX+n,timerSeconds[n]);
    var el=document.getElementById('best-'+n);
    if(el) el.textContent=fmtTime(timerSeconds[n]);
  }
  timerSeconds[n]=0; timerStarted[n]=false;
  var td=document.getElementById('timer-'+n);
  if(td) td.textContent='0:00';
}
function timerResetOne(n){
  clearInterval(timerIntervals[n]); timerRunning[n]=false; timerStarted[n]=false; timerSeconds[n]=0;
  var el=document.getElementById('timer-'+n);
  if(el) el.textContent='0:00';
}
function fmtTime(s){ var m=Math.floor(s/60); var sec=s%60; return m+':'+(sec<10?'0':'')+sec; }
document.addEventListener('DOMContentLoaded',function(){
  [0,1,2,3].forEach(function(n){
    var b=localStorage.getItem(TIMER_PREFIX+n);
    if(b){ var el=document.getElementById('best-'+n); if(el) el.textContent=fmtTime(parseInt(b)); }
  });

});
function checkGap(inp) {
  var val = inp.value.trim().toLowerCase();
  var ans = (inp.dataset.answer || '').toLowerCase();
  inp.classList.remove('correct', 'wrong');
  if (val.length === 0) return;
  if (val === ans) { inp.classList.add('correct'); }
  else if (ans.startsWith(val)) { /* valid prefix */ }
  else { inp.classList.add('wrong'); }
}

/* ── SATZBAU ── */
var satzbauData = [
  { parts: ['obwohl', 'viele', 'verschiedene', 'Meinungen', 'existieren', ',', 'gibt', 'es', 'Gemeinsamkeiten'],
    valid: [['obwohl', 'viele', 'verschiedene', 'Meinungen', 'existieren', ',', 'gibt', 'es', 'Gemeinsamkeiten']], punct: '.' },
  { parts: ['weil', 'jeder', 'Mensch', 'anders', 'denkt', ',', 'sollte', 'man', 'Unterschiede', 'respektieren'],
    valid: [['weil', 'jeder', 'Mensch', 'anders', 'denkt', ',', 'sollte', 'man', 'Unterschiede', 'respektieren']], punct: '.' },
  { parts: ['nachdem', 'er', 'die', 'anderen', 'Ansichten', 'gehört', 'hatte', ',', 'änderte', 'er', 'seine', 'Meinung'],
    valid: [['nachdem', 'er', 'die', 'anderen', 'Ansichten', 'gehört', 'hatte', ',', 'änderte', 'er', 'seine', 'Meinung']], punct: '.' },
  { parts: ['es', 'ist', 'wichtig', ',', 'dass', 'man', 'offen', 'für', 'neue', 'Perspektiven', 'bleibt'],
    valid: [['es', 'ist', 'wichtig', ',', 'dass', 'man', 'offen', 'für', 'neue', 'Perspektiven', 'bleibt']], punct: '.' },
  { parts: ['damit', 'eine', 'Diskussion', 'fruchtbar', 'ist', ',', 'braucht', 'man', 'Respekt', 'und', 'Toleranz'],
    valid: [['damit', 'eine', 'Diskussion', 'fruchtbar', 'ist', ',', 'braucht', 'man', 'Respekt', 'und', 'Toleranz']], punct: '.' },
  { parts: ['wer', 'nur', 'seine', 'eigene', 'Meinung', 'gelten', 'lässt', ',', 'lernt', 'wenig', 'dazu'],
    valid: [['wer', 'nur', 'seine', 'eigene', 'Meinung', 'gelten', 'lässt', ',', 'lernt', 'wenig', 'dazu']], punct: '.' },
  { parts: ['verschiedene', 'Ansichten', 'bereichern', ',', 'indem', 'sie', 'neue', 'Lösungen', 'ermöglichen'],
    valid: [['verschiedene', 'Ansichten', 'bereichern', ',', 'indem', 'sie', 'neue', 'Lösungen', 'ermöglichen']], punct: '.' },
];
var sbDragged = null;
function getSbCursor(){
  var c=document.getElementById('sb-insert-cursor');
  if(!c){ c=document.createElement('div'); c.id='sb-insert-cursor'; c.style.cssText='width:3px;min-height:32px;background:#e67e22;border-radius:2px;align-self:stretch;pointer-events:none;flex-shrink:0;'; }
  return c;
}
function getSbInsertPos(zone,clientX){
  var chips=Array.from(zone.querySelectorAll('.chip'));
  for(var i=0;i<chips.length;i++){ var r=chips[i].getBoundingClientRect(); if(clientX<r.left+r.width/2) return chips[i]; }
  return null;
}
function sbCapitalize(str){ return str.charAt(0).toUpperCase()+str.slice(1); }
function sbUpdateCapitalization(row){
  Array.from(row.querySelectorAll('.chip')).forEach(function(c,i){
    var orig=c.dataset.orig;
    var isProper=orig.charAt(0)===orig.charAt(0).toUpperCase()&&orig.charAt(0)!==orig.charAt(0).toLowerCase();
    c.textContent=isProper?orig:(i===0?sbCapitalize(orig):orig);
  });
}
function sbMakeChip(word){
  var chip=document.createElement('div');
  chip.className='chip'; chip.textContent=word; chip.dataset.orig=word; chip.draggable=true;
  chip.addEventListener('dragstart',function(e){
    sbDragged=chip; timerAutoStart(2);
    e.dataTransfer.setData('text/plain','');
    setTimeout(function(){ chip.style.opacity='0.4'; },0);
  });
  chip.addEventListener('dragend',function(){
    chip.style.opacity=''; sbDragged=null;
    var c=document.getElementById('sb-insert-cursor');
    if(c&&c.parentNode) c.parentNode.removeChild(c);
  });
  return chip;
}
function sbRegisterZone(zone,idx){
  zone.addEventListener('dragover',function(e){
    e.preventDefault(); if(!sbDragged) return;
    var cursor=getSbCursor();
    var before=getSbInsertPos(zone,e.clientX);
    if(before) zone.insertBefore(cursor,before); else zone.appendChild(cursor);
  });
  zone.addEventListener('dragleave',function(e){
    if(!zone.contains(e.relatedTarget)){
      var c=document.getElementById('sb-insert-cursor');
      if(c&&c.parentNode===zone) zone.removeChild(c);
    }
  });
  zone.addEventListener('drop',function(e){
    e.preventDefault(); if(!sbDragged) return;
    var cursor=document.getElementById('sb-insert-cursor');
    if(cursor&&cursor.parentNode===zone){ zone.insertBefore(sbDragged,cursor); zone.removeChild(cursor); }
    else zone.appendChild(sbDragged);
    sbDragged=null;
    var row=document.getElementById('sb-row-'+idx);
    sbUpdateCapitalization(row); sbCheckAuto(idx);
  });
}
function sbColorRow(idx){
  var row=document.getElementById('sb-row-'+idx);
  var chips=Array.from(row.querySelectorAll('.chip'));
  var order=chips.map(function(c){ return c.dataset.orig; });
  var ok=satzbauData[idx].valid.some(function(v){ return JSON.stringify(v)===JSON.stringify(order); });
  chips.forEach(function(c){ c.classList.remove('correct','incorrect'); c.classList.add(ok?'correct':'incorrect'); });
  var ex=row.querySelector('.sb-punkt'); if(ex) ex.parentNode.removeChild(ex);
  if(ok){ var p=document.createElement('span'); p.className='sb-punkt'; p.textContent=satzbauData[idx].punct||'.'; row.appendChild(p); }
  return ok;
}
function sbCheckAuto(idx){
  var bank=document.getElementById('sb-bank-'+idx);
  var row=document.getElementById('sb-row-'+idx);
  var fb=document.getElementById('sb-fb-'+idx);
  if(bank.querySelectorAll('.chip').length>0){
    row.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('correct','incorrect'); });
    row.classList.remove('correct','incorrect'); fb.textContent=''; return;
  }
  setTimeout(function(){
    var ok=sbColorRow(idx);
    if(ok){ row.classList.add('correct'); row.classList.remove('incorrect'); fb.className='satzbau-feedback correct'; fb.textContent='✓ Korrekt!'; sbCheckAllDone(); }
    else { row.classList.add('incorrect'); row.classList.remove('correct'); fb.className='satzbau-feedback incorrect'; fb.textContent='✗ Falsche Reihenfolge – verschiebe die Chips!'; }
  },500);
}
function sbCheckAllDone(){
  var allOk=satzbauData.every(function(_,i){ var r=document.getElementById('sb-row-'+i); return r&&r.classList.contains('correct'); });
  if(allOk) timerStop(2);
}
function sbShowSolution(idx){
  var bank=document.getElementById('sb-bank-'+idx); var row=document.getElementById('sb-row-'+idx);
  var fb=document.getElementById('sb-fb-'+idx); var solution=satzbauData[idx].valid[0];
  var allChips={};
  Array.from(bank.querySelectorAll('.chip')).forEach(function(c){ allChips[c.dataset.orig]=c; });
  Array.from(row.querySelectorAll('.chip')).forEach(function(c){ allChips[c.dataset.orig]=c; });
  while(bank.firstChild) bank.removeChild(bank.firstChild);
  while(row.firstChild) row.removeChild(row.firstChild);
  solution.forEach(function(word,i){ var chip=allChips[word]; if(chip){ chip.textContent=i===0?sbCapitalize(word):word; chip.classList.remove('correct','incorrect'); row.appendChild(chip); } });
  fb.textContent=''; setTimeout(function(){ sbCheckAuto(idx); },100);
}
function sbResetOne(idx){
  var bank=document.getElementById('sb-bank-'+idx); var row=document.getElementById('sb-row-'+idx);
  var fb=document.getElementById('sb-fb-'+idx);
  while(bank.firstChild) bank.removeChild(bank.firstChild);
  while(row.firstChild) row.removeChild(row.firstChild);
  row.classList.remove('correct','incorrect'); fb.textContent=''; fb.className='satzbau-feedback';
  var parts=satzbauData[idx].parts.slice();
  for(var i=parts.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=parts[i]; parts[i]=parts[j]; parts[j]=t; }
  parts.forEach(function(word){ bank.appendChild(sbMakeChip(word)); });
}
function initSatzbau(){
  var container=document.getElementById('satzbauContainer');
  if(!container) return;
  container.innerHTML='';
  satzbauData.forEach(function(ex,idx){
    var item=document.createElement('div'); item.className='satzbau-item';
    var bank=document.createElement('div'); bank.className='chips-container'; bank.id='sb-bank-'+idx;
    var row=document.createElement('div'); row.className='sentence-builder'; row.id='sb-row-'+idx;
    var fb=document.createElement('div'); fb.className='satzbau-feedback'; fb.id='sb-fb-'+idx;
    var parts=ex.parts.slice();
    for(var i=parts.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=parts[i]; parts[i]=parts[j]; parts[j]=t; }
    parts.forEach(function(word){ bank.appendChild(sbMakeChip(word)); });
    sbRegisterZone(bank,idx); sbRegisterZone(row,idx);
    bank.addEventListener('click',function(e){
      var chip=e.target.closest('.chip'); if(!chip) return;
      timerAutoStart(2); row.appendChild(chip); chip.classList.remove('correct','incorrect');
      sbUpdateCapitalization(row); sbCheckAuto(idx);
    });
    row.addEventListener('click',function(e){
      var chip=e.target.closest('.chip'); if(!chip) return;
      bank.appendChild(chip); chip.classList.remove('correct','incorrect');
      chip.textContent=chip.dataset.orig; sbUpdateCapitalization(row); sbCheckAuto(idx);
    });
    var btnRow=document.createElement('div'); btnRow.style.cssText='display:flex;gap:8px;margin-top:6px;';
    var solveBtn=document.createElement('button'); solveBtn.className='btn'; solveBtn.textContent='💡 Lösen';
    solveBtn.setAttribute('data-idx',idx);
    solveBtn.addEventListener('click',function(){ sbShowSolution(parseInt(this.getAttribute('data-idx'))); });
    var resetBtn=document.createElement('button'); resetBtn.className='btn'; resetBtn.textContent='↺ Neustart';
    resetBtn.setAttribute('data-idx',idx);
    resetBtn.addEventListener('click',function(){ sbResetOne(parseInt(this.getAttribute('data-idx'))); });
    btnRow.appendChild(solveBtn); btnRow.appendChild(resetBtn);
    item.appendChild(bank); item.appendChild(row); item.appendChild(fb); item.appendChild(btnRow);
    container.appendChild(item);

}
