<script>/* FB-THEME-INIT */
(function(){
  var saved = null;
  try { saved = localStorage.getItem('fb-theme'); } catch(e) {}
  if (saved === 'dark' || saved === 'light') document.documentElement.dataset.theme = saved;
  function effDark() {
    var t = document.documentElement.dataset.theme;
    if (t === 'dark') return true;
    if (t === 'light') return false;
    return window.matchMedia('(prefers-color-scheme: dark)').matches;
  }
  function paint() {
    var b = document.getElementById('themeToggle');
    if (b) b.textContent = effDark() ? '☀️' : '🌙';
  }
  window.fbToggleTheme = function() {
    var next = effDark() ? 'light' : 'dark';
    document.documentElement.dataset.theme = next;
    try { localStorage.setItem('fb-theme', next); } catch(e) {}
    paint();
  };
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', paint); else paint();
})();
</script>

/* ====== Zustand ====== */
var mode = 'genus';
var deck = [];
var pos = 0;
var locked = false;
var nRight = 0, nTries = 0, streak = 0;

function shuffle(a){
  for (var i = a.length - 1; i > 0; i--){
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function setMode(m){
  mode = m;
  document.getElementById('modeGenus').classList.toggle('active', m === 'genus');
  document.getElementById('modeEnde').classList.toggle('active', m === 'ende');
  startMode();
}

function startMode(){
  if (mode === 'genus'){
    deck = shuffle(NOMEN.slice());
  } else {
    deck = shuffle(NOMEN.concat(WOERTER).slice());
  }
  pos = 0; nRight = 0; nTries = 0; streak = 0; locked = false;
  updateStats();
  renderCard();
}

function updateStats(){
  document.getElementById('statRight').textContent = nRight;
  document.getElementById('statTries').textContent = nTries;
  document.getElementById('statStreak').textContent = streak;
  document.getElementById('counter').textContent =
    Math.min(pos + 1, deck.length) + ' / ' + deck.length;
  var pct = deck.length ? Math.round((pos / deck.length) * 100) : 0;
  document.getElementById('progFill').style.width = pct + '%';
}

function renderCard(){
  locked = false;
  var area = document.getElementById('cardArea');
  if (pos >= deck.length){ renderDone(); return; }
  var it = deck[pos];
  updateStats();

  if (mode === 'genus'){
    area.innerHTML =
      '<div class="card">' +
        '<div class="emoji">' + it.emoji + '</div>' +
        '<div class="prompt">' + it.de + '</div>' +
        '<div class="prompt-sub">' + it.en + '</div>' +
        '<div class="genus-row">' +
          '<button class="genus-btn der" onclick="answerGenus(this,\'der\')">der<span class="key">Taste 1</span></button>' +
          '<button class="genus-btn die" onclick="answerGenus(this,\'die\')">die<span class="key">Taste 2</span></button>' +
          '<button class="genus-btn das" onclick="answerGenus(this,\'das\')">das<span class="key">Taste 3</span></button>' +
        '</div>' +
        '<div class="reveal" id="reveal">&nbsp;</div>' +
      '</div>';
  } else {
    var isNomen = !!it.art;
    var label = isNomen ? 'Nomen — mit Artikel tippen' : (it.pos + ' — Wort tippen');
    area.innerHTML =
      '<div class="card">' +
        '<div class="emoji">' + it.emoji + '</div>' +
        '<div class="prompt">' + it.en + '</div>' +
        '<div class="prompt-sub">' + label + '</div>' +
        '<input class="de-input" id="deInput" autocomplete="off" autocapitalize="off" ' +
               'spellcheck="false" oninput="checkEnde(this)" ' +
               'onkeydown="if(event.key===\'Enter\')skipCard()">' +
        '<div class="input-hint" id="hint">&nbsp;</div>' +
        '<div class="reveal" id="reveal">&nbsp;</div>' +
      '</div>';
    var inp = document.getElementById('deInput');
    if (inp) inp.focus();
  }
}

function artClass(a){ return a === 'der' ? 'art-der' : (a === 'die' ? 'art-die' : 'art-das'); }

function showReveal(it){
  var rev = document.getElementById('reveal');
  if (!rev) return;
  if (it.art){
    var pl = (it.pl && it.pl !== '–') ? '<span class="plural">Pl.: die ' + it.pl + '</span>' : '<span class="plural">kein Plural</span>';
    rev.innerHTML = '<span class="' + artClass(it.art) + '">' + it.art + ' ' + it.de + '</span> ' + pl;
  } else {
    rev.innerHTML = '<span class="art-das">' + it.de + '</span>';
  }
}

function answerGenus(btn, choice){
  if (locked) return;
  var it = deck[pos];
  nTries++;
  if (choice === it.art){
    locked = true;
    btn.classList.add('flash-correct');
    nRight++; streak++;
    showReveal(it);
    updateStats();
    setTimeout(nextCard, 850);
  } else {
    btn.classList.add('flash-wrong');
    streak = 0;
    updateStats();
  }
}

function checkEnde(inp){
  var it = deck[pos];
  var expected = it.art ? (it.art + ' ' + it.de) : it.de;
  var v = inp.value.replace(/\s+/g, ' ').trim();
  inp.classList.remove('correct', 'wrong');
  var hint = document.getElementById('hint');
  if (!v){ if (hint) hint.innerHTML = '&nbsp;'; return; }
  var vv = v.toLowerCase();
  var ee = expected.toLowerCase();
  if (vv === ee){
    if (locked) return;
    locked = true;
    inp.classList.add('correct');
    nTries++; nRight++; streak++;
    showReveal(it);
    updateStats();
    setTimeout(nextCard, 850);
    return;
  }
  if (ee.indexOf(vv) === 0){ return; } /* Präfix → neutral */
  inp.classList.add('wrong');
}

function nextCard(){ pos++; renderCard(); }

function skipCard(){
  if (locked) return;
  streak = 0;
  var it = deck[pos];
  showReveal(it);
  locked = true;
  nTries++;
  updateStats();
  setTimeout(nextCard, 1100);
}

function renderDone(){
  var area = document.getElementById('cardArea');
  var quote = nRight >= Math.round(deck.length * 0.9) ? 'Stark — fast alles sitzt!' :
              nRight >= Math.round(deck.length * 0.6) ? 'Gut gemacht — weiter so!' :
              'Noch mal starten lohnt sich.';
  area.innerHTML =
    '<div class="card done-card">' +
      '<div class="big">🎉</div>' +
      '<h2>' + nRight + ' / ' + deck.length + ' richtig</h2>' +
      '<p>' + quote + '</p>' +
    '</div>';
  document.getElementById('progFill').style.width = '100%';
  document.getElementById('counter').textContent = deck.length + ' / ' + deck.length;
}

/* Tastatur: 1/2/3 für der/die/das im Genus-Modus */
document.addEventListener('keydown', function(e){
  if (mode !== 'genus' || locked) return;
  var map = { '1':'der', '2':'die', '3':'das' };
  if (map[e.key]){
    var btns = document.querySelectorAll('.genus-btn');
    var idx = e.key === '1' ? 0 : (e.key === '2' ? 1 : 2);
    if (btns[idx]) answerGenus(btns[idx], map[e.key]);
  }
});

startMode();
</script>
</body>
</html>
