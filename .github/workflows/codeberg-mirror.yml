name: Mirror to Codeberg

# Spiegelt jeden Push (Branches + Tags) automatisch nach
# codeberg.org/fabbuLos/daf-b2-uebungen — als Lebensversicherung
# für den Fall, dass GitHub den Account jemals sperrt oder seine
# Politik ändert. Codeberg ist gemeinnützig, EU-gehostet, DSGVO-konform.
#
# Voraussetzungen (einmalig in Repo-Settings → Secrets):
#   CODEBERG_USERNAME  → fabbuLos
#   CODEBERG_TOKEN     → PAT mit write:repository-Scope
#
# git push --mirror überträgt ALLE Refs und löscht remote auch das,
# was lokal gelöscht wurde — echtes 1:1-Spiegeln, kein Drift.

on:
  push:
    branches: ['**']
    tags: ['**']
  delete:
  workflow_dispatch:

concurrency:
  group: codeberg-mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all refs
        run: |
          git fetch --prune --tags origin
          git fetch --prune origin '+refs/heads/*:refs/heads/*' || true

      - name: Push to Codeberg
        env:
          CB_USER: ${{ secrets.CODEBERG_USERNAME }}
          CB_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          if [ -z "$CB_USER" ] || [ -z "$CB_TOKEN" ]; then
            echo "::error::Secrets CODEBERG_USERNAME und CODEBERG_TOKEN fehlen"
            exit 1
          fi
          git remote add codeberg "https://${CB_USER}:${CB_TOKEN}@codeberg.org/fabbuLos/daf-b2-uebungen.git"
          git push --mirror codeberg
