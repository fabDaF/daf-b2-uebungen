<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" role="img" aria-label="Postkarten stehen an einer Wellenkante, eine leere Karte wird mit der passenden Karte gefuellt — Lueckentext">
<rect width="1200" height="200" fill="#EEEDFE"/>
<path d="M0,92 C200,72 380,98 560,86 C740,74 920,96 1200,84 L1200,200 L0,200 Z" fill="#CECBF6"/>
<!-- Postkarten stehen auf der Wellenkante (Kante = Ablage = Wellenlinie) -->
<g stroke="#26215C" stroke-width="2">
  <g transform="translate(300,83) rotate(-6)">
    <rect x="-30" y="-25" width="60" height="50" rx="4" fill="#AFA9EC"/>
    <rect x="11" y="-20" width="14" height="14" rx="1" fill="#EEEDFE"/>
    <line x1="-21" y1="4" x2="7" y2="4" stroke="#EEEDFE" stroke-width="2.5"/>
    <line x1="-21" y1="12" x2="1" y2="12" stroke="#EEEDFE" stroke-width="2.5"/>
  </g>
  <g transform="translate(480,83) rotate(5)">
    <rect x="-30" y="-25" width="60" height="50" rx="4" fill="#CECBF6"/>
    <rect x="11" y="-20" width="14" height="14" rx="1" fill="#EEEDFE"/>
    <line x1="-21" y1="4" x2="7" y2="4" stroke="#EEEDFE" stroke-width="2.5"/>
    <line x1="-21" y1="12" x2="1" y2="12" stroke="#EEEDFE" stroke-width="2.5"/>
  </g>
  <g transform="translate(840,83) rotate(-4)">
    <rect x="-30" y="-25" width="60" height="50" rx="4" fill="#7F77DD"/>
    <rect x="11" y="-20" width="14" height="14" rx="1" fill="#EEEDFE"/>
    <line x1="-21" y1="4" x2="7" y2="4" stroke="#EEEDFE" stroke-width="2.5"/>
    <line x1="-21" y1="12" x2="1" y2="12" stroke="#EEEDFE" stroke-width="2.5"/>
  </g>
</g>
<!-- leere Karte (die Luecke) -->
<rect x="632" y="60" width="60" height="50" rx="4" fill="#EEEDFE" stroke="#3C3489" stroke-width="3" stroke-dasharray="7 6"/>
<!-- die passende Karte faellt hinein (Bernstein-Akzent) -->
<g transform="translate(668,44) rotate(15)">
  <rect x="-28" y="-21" width="56" height="44" rx="4" fill="#f3c46a" stroke="#26215C" stroke-width="2"/>
  <rect x="10" y="-16" width="12" height="12" rx="1" fill="#EEEDFE"/>
  <line x1="-19" y1="4" x2="6" y2="4" stroke="#26215C" stroke-width="2" opacity="0.5"/>
</g>
<!-- vordere Welle = die Kante, auf der die Karten stehen -->
<path d="M0,108 C160,96 320,116 470,106 C620,96 770,114 900,106 C1010,98 1110,110 1200,104 L1200,200 L0,200 Z" fill="#534AB7"/>
<path d="M0,108 C160,96 320,116 470,106 C620,96 770,114 900,106 C1010,98 1110,110 1200,104" fill="none" stroke="#3C3489" stroke-width="3"/>
<path d="M0,150 C220,134 460,164 720,150 C940,138 1090,160 1200,150 L1200,200 L0,200 Z" fill="#3C3489"/>
<path d="M0,180 C240,168 500,190 760,178 C980,168 1110,186 1200,178 L1200,200 L0,200 Z" fill="#26215C"/>
</svg>
