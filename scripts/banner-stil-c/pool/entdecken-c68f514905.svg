<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" role="img" aria-label="Eine geöffnete Muschel in der Welle — darin leuchtet die goldene Perle">
  <rect width="1200" height="200" fill="#EEEDFE"/>
  <!-- zwei Vögel -->
  <path d="M 880 44 q 7 -7 14 0 q 7 -7 14 0" fill="none" stroke="#7F77DD" stroke-width="3" stroke-linecap="round"/>
  <path d="M 934 60 q 5 -5 10 0 q 5 -5 10 0" fill="none" stroke="#7F77DD" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Wellenbahnen hinten -->
  <path d="M 0 108 Q 190 90 380 104 Q 600 120 820 102 Q 1010 88 1200 106 L 1200 200 L 0 200 Z" fill="#CECBF6"/>
  <path d="M 0 138 Q 230 118 460 134 Q 700 150 920 132 Q 1070 120 1200 136 L 1200 200 L 0 200 Z" fill="#AFA9EC"/>
  <!-- aufsteigende Luftblasen rechts der Muschel -->
  <circle cx="676" cy="92" r="5" fill="none" stroke="#7F77DD" stroke-width="2.5"/>
  <circle cx="690" cy="70" r="3.5" fill="none" stroke="#7F77DD" stroke-width="2"/>
  <circle cx="680" cy="50" r="2.5" fill="none" stroke="#7F77DD" stroke-width="2"/>
  <!-- Muschel: weit geöffnet, sitzt in der Wellenmulde -->
  <g>
    <!-- obere Schale, weit aufgeklappt -->
    <g transform="translate(536,116) rotate(-52)">
      <path d="M 0 0 L 100 0 Q 100 -48 50 -60 Q 0 -48 0 0 Z" fill="#3C3489"/>
      <path d="M 16 -6 L 24 -46 M 38 -8 L 44 -54 M 58 -8 L 60 -56 M 78 -6 L 72 -50" stroke="#534AB7" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
    <!-- goldene Perle (einziger Akzent), mittig in der offenen Schale -->
    <circle cx="600" cy="104" r="15" fill="#f3c46a"/>
    <!-- untere Schale -->
    <path d="M 534 118 L 650 118 Q 650 166 592 178 Q 534 166 534 118 Z" fill="#26215C"/>
    <path d="M 550 126 L 558 168 M 572 128 L 578 174 M 600 128 L 602 174 M 626 126 L 620 162" stroke="#3C3489" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  <!-- vordere Wellen überlappen die Schale unten -->
  <path d="M 0 164 Q 210 146 430 158 Q 670 172 890 156 Q 1060 144 1200 160 L 1200 200 L 0 200 Z" fill="#534AB7"/>
  <path d="M 0 184 Q 280 168 560 180 Q 840 192 1200 176 L 1200 200 L 0 200 Z" fill="#26215C"/>
</svg>
