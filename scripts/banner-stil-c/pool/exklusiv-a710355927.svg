<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" role="img" aria-label="Ein Koffer wartet am Ufer, das Flugzeug steigt zur goldenen Sonne — das Jahr im Ausland beginnt">
  <rect width="1200" height="200" fill="#EEEDFE"/>
  <!-- Sonne (einziger Akzent) -->
  <circle cx="905" cy="54" r="24" fill="#f3c46a"/>
  <circle cx="905" cy="54" r="34" fill="none" stroke="#f3c46a" stroke-width="2" opacity="0.55"/>
  <!-- zwei Vögel -->
  <path d="M 240 52 q 7 -7 14 0 q 7 -7 14 0" fill="none" stroke="#7F77DD" stroke-width="3" stroke-linecap="round"/>
  <path d="M 292 70 q 5 -5 10 0 q 5 -5 10 0" fill="none" stroke="#7F77DD" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Flugzeug, steigt nach rechts zur Sonne -->
  <g transform="translate(672,84) rotate(-11)">
    <path d="M 0 0 L 74 0 Q 92 3 74 8 L 12 8 Q -8 6 0 0 Z" fill="#3C3489"/>
    <path d="M 30 1 L 12 -18 L 24 -18 L 46 1 Z" fill="#3C3489"/>
    <path d="M 34 7 L 24 22 L 34 22 L 50 7 Z" fill="#3C3489"/>
    <path d="M 8 1 L -2 -12 L 6 -12 L 18 1 Z" fill="#3C3489"/>
  </g>
  <!-- gepunktete Reiselinie vom Koffer zum Flugzeug -->
  <path d="M 352 128 Q 470 128 560 108 T 668 86" fill="none" stroke="#7F77DD" stroke-width="3" stroke-dasharray="1 14" stroke-linecap="round"/>
  <!-- Wellenbahnen -->
  <path d="M 0 116 Q 170 96 340 110 Q 560 128 760 108 Q 960 90 1200 112 L 1200 200 L 0 200 Z" fill="#CECBF6"/>
  <path d="M 0 142 Q 240 120 470 138 Q 700 156 900 136 Q 1060 122 1200 140 L 1200 200 L 0 200 Z" fill="#AFA9EC"/>
  <!-- Koffer steht auf der mittleren Welle -->
  <g fill="#26215C">
    <rect x="300" y="126" width="52" height="40" rx="5"/>
    <path d="M 314 126 L 314 118 Q 314 112 320 112 L 332 112 Q 338 112 338 118 L 338 126 L 331 126 L 331 119 L 321 119 L 321 126 Z"/>
    <rect x="306" y="132" width="40" height="4" fill="#534AB7"/>
  </g>
  <path d="M 0 168 Q 200 148 420 162 Q 660 178 880 160 Q 1050 148 1200 164 L 1200 200 L 0 200 Z" fill="#534AB7"/>
  <path d="M 0 186 Q 260 170 520 182 Q 800 194 1200 178 L 1200 200 L 0 200 Z" fill="#26215C"/>
</svg>
