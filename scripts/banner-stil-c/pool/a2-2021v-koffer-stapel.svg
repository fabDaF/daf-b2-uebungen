<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" role="img" aria-label="Reisekoffer werden zu einem Turm gestapelt über geschichteten Wellen — Satzbau">
<rect width="1200" height="200" fill="#EEEDFE"/>
<!-- Sonne als einziger Bernstein-Akzent -->
<circle cx="880" cy="52" r="26" fill="#f3c46a"/>
<circle cx="880" cy="52" r="37" fill="none" stroke="#f3c46a" stroke-width="2" opacity="0.4"/>
<!-- ferne Hügel -->
<path d="M40,120 L180,80 L320,120 Z" fill="#CECBF6"/>
<!-- Vögel -->
<path d="M300,58 q10,-8 20,0 M330,48 q10,-8 20,0" fill="none" stroke="#534AB7" stroke-width="3" stroke-linecap="round"/>
<!-- gestapelte Koffer (von unten nach oben kleiner) -->
<g>
  <!-- unterster Koffer -->
  <rect x="500" y="112" width="150" height="46" rx="8" fill="#534AB7"/>
  <rect x="558" y="104" width="34" height="12" rx="4" fill="#534AB7"/>
  <line x1="500" y1="126" x2="650" y2="126" stroke="#3C3489" stroke-width="3"/>
  <circle cx="520" cy="135" r="3" fill="#AFA9EC"/>
  <!-- mittlerer Koffer -->
  <rect x="520" y="72" width="112" height="40" rx="7" fill="#7F77DD"/>
  <rect x="566" y="65" width="30" height="10" rx="4" fill="#7F77DD"/>
  <line x1="520" y1="84" x2="632" y2="84" stroke="#534AB7" stroke-width="2.5"/>
  <circle cx="537" cy="92" r="2.6" fill="#EEEDFE"/>
  <!-- oberster Koffer -->
  <rect x="542" y="40" width="78" height="34" rx="6" fill="#AFA9EC"/>
  <rect x="573" y="34" width="24" height="9" rx="4" fill="#AFA9EC"/>
  <line x1="542" y1="50" x2="620" y2="50" stroke="#7F77DD" stroke-width="2"/>
  <!-- Aufkleber-Punkt -->
  <circle cx="558" cy="60" r="4" fill="#3C3489"/>
</g>
<!-- kleiner schwebender Koffer, der oben angesetzt wird (Aufbau-Idee) -->
<g>
  <rect x="551" y="10" width="60" height="24" rx="6" fill="#3C3489"/>
  <rect x="573" y="4" width="18" height="8" rx="4" fill="#3C3489"/>
  <line x1="551" y1="18" x2="611" y2="18" stroke="#26215C" stroke-width="2"/>
  <circle cx="565" cy="25" r="2.4" fill="#AFA9EC"/>
</g>
<!-- vordere Welle -->
<path d="M0,150 C190,132 400,164 620,150 C840,136 1020,166 1200,150 V200 H0 Z" fill="#3C3489"/>
<!-- Gischt -->
<circle cx="410" cy="150" r="4" fill="#EEEDFE" opacity="0.55"/>
<circle cx="980" cy="152" r="3.5" fill="#EEEDFE" opacity="0.55"/>
<path d="M0,180 C240,166 480,192 720,178 C940,166 1090,188 1200,178 V200 H0 Z" fill="#26215C"/>
</svg>
