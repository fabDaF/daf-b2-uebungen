<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" role="img" aria-label="Eine Postkarte wird geschrieben — die Schreiblinie geht in die Welle über">
<rect width="1200" height="200" fill="#EEEDFE"/>
<!-- postcard, slightly tilted -->
<g transform="rotate(-4 600 96)">
<rect x="470" y="42" width="260" height="112" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="2"/>
<line x1="600" y1="52" x2="600" y2="144" stroke="#7F77DD" stroke-width="2" opacity="0.6"/>
<!-- stamp accent -->
<rect x="686" y="52" width="34" height="30" rx="2" fill="#f3c46a"/>
<path d="M690,74 L697,64 L703,70 L710,60 L716,74 Z" fill="#3C3489"/>
<!-- address lines right -->
<line x1="616" y1="98" x2="712" y2="98" stroke="#7F77DD" stroke-width="3" stroke-linecap="round"/>
<line x1="616" y1="112" x2="700" y2="112" stroke="#7F77DD" stroke-width="3" stroke-linecap="round"/>
<line x1="616" y1="126" x2="708" y2="126" stroke="#7F77DD" stroke-width="3" stroke-linecap="round"/>
<!-- written message left -->
<line x1="486" y1="66" x2="582" y2="66" stroke="#534AB7" stroke-width="3" stroke-linecap="round"/>
<line x1="486" y1="82" x2="574" y2="82" stroke="#534AB7" stroke-width="3" stroke-linecap="round"/>
<line x1="486" y1="98" x2="582" y2="98" stroke="#534AB7" stroke-width="3" stroke-linecap="round"/>
</g>
<!-- pen -->
<g transform="rotate(38 470 150)">
<rect x="360" y="146" width="150" height="9" rx="4" fill="#3C3489"/>
<path d="M510,146 L528,150.5 L510,155 Z" fill="#26215C"/>
<rect x="360" y="146" width="20" height="9" rx="4" fill="#534AB7"/>
</g>
<path d="M0,150 C200,134 420,162 640,148 C860,134 1040,164 1200,150 V200 H0 Z" fill="#534AB7"/>
<path d="M0,172 C230,158 470,186 710,172 C930,160 1090,182 1200,172 V200 H0 Z" fill="#3C3489"/>
<path d="M0,190 C260,180 520,198 780,189 C1000,182 1110,193 1200,188 V200 H0 Z" fill="#26215C"/>
</svg>
