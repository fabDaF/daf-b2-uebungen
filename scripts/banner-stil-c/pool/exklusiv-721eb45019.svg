<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" role="img" aria-label="Eine Fußspur zieht über die verschneiten Hügel der goldenen Wintersonne entgegen — der Weg ist schon gegangen">
  <rect width="1200" height="200" fill="#EEEDFE"/>
  <!-- Wintersonne mit Halo -->
  <circle cx="880" cy="52" r="34" fill="#CECBF6" opacity="0.55"/>
  <circle cx="880" cy="52" r="21" fill="#f3c46a"/>
  <!-- fernste Schneehügel -->
  <path d="M0,96 C200,72 400,102 620,84 C840,68 1020,96 1200,82 L1200,200 L0,200 Z" fill="#CECBF6"/>
  <!-- mittlere Hügel -->
  <path d="M0,128 C240,102 500,136 760,116 C960,102 1100,128 1200,118 L1200,200 L0,200 Z" fill="#AFA9EC"/>
  <!-- dunklere Hangbahn -->
  <path d="M0,158 C260,134 540,166 800,148 C1000,136 1120,158 1200,150 L1200,200 L0,200 Z" fill="#534AB7"/>
  <!-- Winter-Tanne auf der Hangbahn -->
  <g fill="#26215C">
    <path d="M214,152 L248,66 L282,152 Z"/>
    <path d="M222,110 L248,48 L274,110 Z"/>
    <path d="M230,78 L248,34 L266,78 Z"/>
  </g>
  <!-- vorderste Bahn -->
  <path d="M0,186 C280,168 560,192 840,178 C1020,170 1120,186 1200,178 L1200,200 L0,200 Z" fill="#26215C"/>
  <!-- die Fußspur: Doppelpunkte, von vorn nach hinten zur Sonne -->
  <g fill="#EEEDFE">
    <ellipse cx="150" cy="194" rx="7" ry="4"/><ellipse cx="184" cy="189" rx="7" ry="4"/>
    <ellipse cx="220" cy="192" rx="6.5" ry="3.7"/><ellipse cx="256" cy="186" rx="6.5" ry="3.7"/>
    <ellipse cx="294" cy="188" rx="6" ry="3.4"/><ellipse cx="330" cy="182" rx="6" ry="3.4"/>
    <ellipse cx="370" cy="176" rx="5.5" ry="3"/><ellipse cx="406" cy="170" rx="5.5" ry="3"/>
    <ellipse cx="444" cy="172" rx="5" ry="2.8"/><ellipse cx="480" cy="165" rx="5" ry="2.8"/>
    <ellipse cx="516" cy="166" rx="4.5" ry="2.5"/><ellipse cx="550" cy="159" rx="4.5" ry="2.5"/>
    <ellipse cx="588" cy="150" rx="4" ry="2.2"/><ellipse cx="620" cy="144" rx="4" ry="2.2"/>
    <ellipse cx="654" cy="145" rx="3.5" ry="2"/><ellipse cx="686" cy="138" rx="3.5" ry="2"/>
    <ellipse cx="716" cy="136" rx="3" ry="1.7"/><ellipse cx="744" cy="130" rx="3" ry="1.7"/>
    <ellipse cx="772" cy="126" rx="2.6" ry="1.5"/><ellipse cx="798" cy="120" rx="2.6" ry="1.5"/>
    <ellipse cx="824" cy="114" rx="2.2" ry="1.3"/><ellipse cx="848" cy="108" rx="2.2" ry="1.3"/>
    <ellipse cx="870" cy="101" rx="1.9" ry="1.1"/><ellipse cx="890" cy="95" rx="1.9" ry="1.1"/>
  </g>
  <!-- Schneehaube am Baum -->
  <ellipse cx="248" cy="152" rx="30" ry="5.5" fill="#EEEDFE" opacity="0.9"/>
  <!-- zwei Vögel -->
  <path d="M420,42 q7,-7 14,0 q7,-7 14,0" stroke="#534AB7" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M470,30 q6,-6 12,0 q6,-6 12,0" stroke="#534AB7" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
