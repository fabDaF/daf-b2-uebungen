<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" role="img" aria-label="Ein Zug aus zusammengesetzten Wagen fährt auf einer Schiene, die zur Wellenlinie wird — Satzbau">
<rect width="1200" height="200" fill="#EEEDFE"/>
<path d="M150,150 C280,140 380,150 500,150 Z" fill="#CECBF6"/>
<path d="M760,150 C880,138 960,146 1060,150 Z" fill="#CECBF6"/>
<!-- ferne Schiene -->
<path d="M0,120 C200,104 450,128 700,116 C900,106 1050,122 1200,114" fill="none" stroke="#3C3489" stroke-width="4"/>
<!-- Schwellen zwischen den Schienen -->
<g fill="#AFA9EC">
<rect x="120" y="118" width="10" height="26" rx="2" transform="rotate(4 125 131)"/>
<rect x="240" y="120" width="10" height="26" rx="2"/>
<rect x="360" y="122" width="10" height="26" rx="2"/>
<rect x="760" y="120" width="10" height="26" rx="2"/>
<rect x="880" y="118" width="10" height="26" rx="2"/>
<rect x="1000" y="120" width="10" height="26" rx="2"/>
</g>
<!-- Zug: zusammengesetzte Wagen (Satzbau) -->
<g>
<rect x="300" y="92" width="96" height="46" rx="4" fill="#AFA9EC"/>
<rect x="404" y="84" width="96" height="54" rx="4" fill="#534AB7"/>
<path d="M508,138 L508,74 L590,74 L590,138 Z" fill="#3C3489"/>
<rect x="600" y="88" width="26" height="50" rx="3" fill="#3C3489"/>
<rect x="556" y="52" width="16" height="24" rx="2" fill="#26215C"/>
</g>
<line x1="396" y1="128" x2="404" y2="128" stroke="#26215C" stroke-width="4"/>
<line x1="500" y1="128" x2="508" y2="128" stroke="#26215C" stroke-width="4"/>
<circle cx="619" cy="120" r="6" fill="#f3c46a"/>
<g fill="#26215C"><circle cx="330" cy="140" r="8"/><circle cx="372" cy="140" r="8"/><circle cx="432" cy="140" r="8"/><circle cx="474" cy="140" r="8"/><circle cx="536" cy="140" r="8"/><circle cx="574" cy="140" r="8"/></g>
<g fill="#EEEDFE"><circle cx="330" cy="140" r="3"/><circle cx="372" cy="140" r="3"/><circle cx="432" cy="140" r="3"/><circle cx="474" cy="140" r="3"/><circle cx="536" cy="140" r="3"/><circle cx="574" cy="140" r="3"/></g>
<circle cx="556" cy="44" r="6" fill="#CECBF6" opacity="0.7"/>
<circle cx="544" cy="34" r="8" fill="#CECBF6" opacity="0.55"/>
<!-- nahe Schiene = Wellenkante (doppelbödig) -->
<path d="M0,146 C200,130 450,154 700,142 C900,132 1050,148 1200,140 V200 H0 Z" fill="#7F77DD"/>
<path d="M0,146 C200,130 450,154 700,142 C900,132 1050,148 1200,140" fill="none" stroke="#534AB7" stroke-width="4" stroke-linecap="round"/>
<path d="M0,168 C210,156 430,182 650,168 C860,156 1040,182 1200,168 V200 H0 Z" fill="#3C3489"/>
<path d="M0,186 C240,179 500,196 760,187 C980,180 1110,193 1200,186 V200 H0 Z" fill="#26215C"/>
</svg>
