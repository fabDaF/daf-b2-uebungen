<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" role="img" aria-label="Panorama berühmter Sehenswürdigkeiten als Silhouetten über Wellen — Wortschatz">
<rect width="1200" height="200" fill="#EEEDFE"/>
<!-- Sonne als einziger Bernstein-Akzent -->
<circle cx="600" cy="52" r="28" fill="#f3c46a"/>
<circle cx="600" cy="52" r="40" fill="none" stroke="#f3c46a" stroke-width="2" opacity="0.4"/>
<!-- Vögel -->
<path d="M250,50 q10,-8 20,0 M280,40 q10,-8 20,0" fill="none" stroke="#AFA9EC" stroke-width="3" stroke-linecap="round"/>
<!-- hintere Reihe (heller) -->
<g fill="#CECBF6">
  <!-- Kuppelbau -->
  <path d="M300,132 L300,104 A26,26 0 0 1 352,104 L352,132 Z"/>
  <rect x="296" y="128" width="60" height="6"/>
  <!-- Hochhaus -->
  <rect x="820" y="86" width="34" height="46"/>
  <rect x="858" y="98" width="26" height="34"/>
</g>
<!-- mittlere Reihe -->
<g fill="#7F77DD">
  <!-- Eiffelturm-artiger Turm -->
  <path d="M470,132 L486,132 L479,84 L472,84 Z"/>
  <path d="M479,84 L474,58 L484,58 Z"/>
  <line x1="479" y1="58" x2="479" y2="40" stroke="#7F77DD" stroke-width="3"/>
  <path d="M466,108 L492,108 L488,98 L470,98 Z"/>
  <path d="M462,132 L474,108 L484,108 L472,132 Z"/>
  <path d="M496,132 L484,108 L474,108 L486,132 Z"/>
  <!-- Torbogen -->
  <path d="M700,132 L700,110 A24,24 0 0 1 748,110 L748,132 L734,132 L734,112 A10,10 0 0 0 714,112 L714,132 Z"/>
</g>
<!-- vordere Reihe (dunkler, Tiefe) -->
<g fill="#3C3489">
  <!-- Kirch-/Uhrturm -->
  <rect x="560" y="72" width="30" height="60"/>
  <path d="M556,72 L594,72 L575,52 Z"/>
  <rect x="569" y="88" width="12" height="14" rx="2" fill="#EEEDFE"/>
  <!-- kleine Häuserzeile -->
  <path d="M380,132 L380,116 L404,102 L428,116 L428,132 Z"/>
  <path d="M636,132 L636,118 L660,104 L684,118 L684,132 Z"/>
  <!-- Brücken-Andeutung rechts -->
  <path d="M900,132 L900,116 A40,40 0 0 1 980,116 L980,132 L968,132 L968,120 A28,28 0 0 0 912,120 L912,132 Z"/>
</g>
<!-- erleuchtete Fenster-Punkte (kein zweiter Amber – hell) -->
<g fill="#EEEDFE" opacity="0.7">
  <rect x="828" y="96" width="6" height="8"/><rect x="840" y="110" width="6" height="8"/>
  <rect x="864" y="108" width="5" height="7"/>
</g>
<!-- vordere Welle -->
<path d="M0,146 C150,124 300,150 470,138 C650,124 800,150 960,138 C1080,129 1150,140 1200,134 V200 H0 Z" fill="#534AB7"/>
<path d="M0,164 C200,148 420,176 640,162 C860,149 1040,178 1200,164 V200 H0 Z" fill="#3C3489"/>
<path d="M0,184 C240,172 500,196 760,183 C980,172 1110,190 1200,182 V200 H0 Z" fill="#26215C"/>
<circle cx="330" cy="150" r="3.5" fill="#EEEDFE" opacity="0.5"/>
<circle cx="1030" cy="150" r="3" fill="#EEEDFE" opacity="0.5"/>
</svg>
