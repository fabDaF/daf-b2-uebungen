<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" role="img" aria-label="Eine gefaltete Straßenkarte mit einer leeren Lücke; ihre Unterkante läuft als Welle weiter — Lückentext">
<rect width="1200" height="200" fill="#EEEDFE"/>
<!-- ferne Hügel-Silhouette für Tiefe -->
<path d="M0,116 L120,84 L250,116 Z" fill="#CECBF6"/>
<path d="M770,116 L910,74 L1050,116 Z" fill="#CECBF6"/>
<!-- Vögel -->
<path d="M960,50 q10,-8 20,0 M990,40 q10,-8 20,0" fill="none" stroke="#AFA9EC" stroke-width="3" stroke-linecap="round"/>
<!-- vordere Welle: die Unterkante der Karte IST der Wellenkamm -->
<path d="M0,150 C120,140 220,128 330,120 L402,118 L474,116 L546,114 L618,112 L690,110 C850,100 1030,132 1200,118 V200 H0 Z" fill="#7F77DD"/>
<!-- gefaltete Straßenkarte (Ziehharmonika-Faltung, Zickzack-Oberkante) -->
<g>
  <!-- Panels, abwechselnd; Oberkante im Zickzack -->
  <path d="M330,66 L402,56 L402,118 L330,120 Z" fill="#CECBF6"/>
  <path d="M402,56 L474,68 L474,116 L402,118 Z" fill="#AFA9EC"/>
  <!-- Lücke: fehlendes Panel -->
  <path d="M474,68 L546,58 L546,114 L474,116 Z" fill="#EEEDFE" stroke="#534AB7" stroke-width="2" stroke-dasharray="6 5"/>
  <path d="M546,58 L618,70 L618,112 L546,114 Z" fill="#AFA9EC"/>
  <path d="M618,70 L690,60 L690,110 L618,112 Z" fill="#CECBF6"/>
  <!-- Faltkanten -->
  <line x1="402" y1="56" x2="402" y2="118" stroke="#7F77DD" stroke-width="2"/>
  <line x1="618" y1="70" x2="618" y2="112" stroke="#7F77DD" stroke-width="2"/>
  <!-- Straßen (überspringen die Lücke) -->
  <path d="M342,100 C372,90 408,92 438,96" fill="none" stroke="#EEEDFE" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <path d="M560,92 C600,86 650,96 682,88" fill="none" stroke="#EEEDFE" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <path d="M352,80 C384,92 420,98 452,104" fill="none" stroke="#534AB7" stroke-width="2" stroke-linecap="round" opacity="0.65"/>
  <!-- Städte-Punkte -->
  <circle cx="372" cy="90" r="3" fill="#3C3489"/>
  <circle cx="596" cy="90" r="3" fill="#3C3489"/>
  <circle cx="662" cy="82" r="3" fill="#3C3489"/>
</g>
<!-- Amber-Standortpin fällt in die Lücke (einziger Bernstein-Akzent) -->
<g>
  <path d="M510,40 C499,40 491,48 491,59 C491,71 510,86 510,86 C510,86 529,71 529,59 C529,48 521,40 510,40 Z" fill="#f3c46a"/>
  <circle cx="510" cy="58" r="6" fill="#EEEDFE"/>
</g>
<!-- Kammlinie (Highlight) — Unterkante der Karte, die als Welle weiterläuft -->
<path d="M0,150 C120,140 220,128 330,120 L402,118 L474,116 L546,114 L618,112 L690,110 C850,100 1030,132 1200,118" fill="none" stroke="#534AB7" stroke-width="3.5" stroke-linecap="round"/>
<!-- Gischt -->
<circle cx="800" cy="124" r="4" fill="#EEEDFE" opacity="0.6"/>
<circle cx="170" cy="138" r="3.5" fill="#EEEDFE" opacity="0.55"/>
<!-- tiefere Wellen -->
<path d="M0,158 C200,142 420,170 640,156 C860,143 1040,172 1200,158 V200 H0 Z" fill="#3C3489"/>
<path d="M0,182 C240,170 500,194 760,181 C980,170 1110,188 1200,180 V200 H0 Z" fill="#26215C"/>
</svg>
