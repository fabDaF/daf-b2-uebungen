<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" role="img" aria-label="Ein Pfad aus Trittsteinen führt durch den dunklen Tannenwald zur Hütte — der goldene Stein schwebt über seiner Lücke">
  <rect width="1200" height="200" fill="#EEEDFE"/>
  <!-- ferne Hügelbahn -->
  <path d="M0,92 C180,74 340,96 520,84 C720,70 900,94 1200,80 L1200,200 L0,200 Z" fill="#CECBF6"/>
  <!-- ferne Tannen -->
  <g fill="#AFA9EC">
    <path d="M205,88 L219,60 L233,88 Z"/><path d="M209,74 L219,52 L229,74 Z"/>
    <path d="M262,92 L274,68 L286,92 Z"/><path d="M266,80 L274,62 L282,80 Z"/>
    <path d="M905,84 L919,54 L933,84 Z"/><path d="M909,68 L919,46 L929,68 Z"/>
    <path d="M962,88 L974,62 L986,88 Z"/><path d="M966,74 L974,56 L982,74 Z"/>
  </g>
  <!-- mittlere Waldbahn -->
  <path d="M0,122 C220,104 420,128 640,114 C860,100 1020,126 1200,112 L1200,200 L0,200 Z" fill="#AFA9EC"/>
  <!-- mittlere Tannen -->
  <g fill="#534AB7">
    <path d="M120,118 L140,76 L160,118 Z"/><path d="M126,96 L140,64 L154,96 Z"/>
    <path d="M330,124 L352,78 L374,124 Z"/><path d="M337,100 L352,66 L367,100 Z"/>
    <path d="M1030,118 L1052,72 L1074,118 Z"/><path d="M1037,94 L1052,60 L1067,94 Z"/>
  </g>
  <!-- Hütte der Großmutter auf der mittleren Bahn -->
  <g>
    <rect x="836" y="96" width="64" height="34" fill="#3C3489"/>
    <path d="M826,98 L868,68 L910,98 Z" fill="#26215C"/>
    <rect x="856" y="106" width="14" height="18" fill="#EEEDFE"/>
    <rect x="888" y="74" width="9" height="20" fill="#26215C"/>
  </g>
  <!-- dunkle Waldbahn -->
  <path d="M0,156 C240,138 460,162 700,148 C920,136 1080,158 1200,146 L1200,200 L0,200 Z" fill="#534AB7"/>
  <g fill="#26215C">
    <path d="M55,152 L83,94 L111,152 Z"/><path d="M63,122 L83,80 L103,122 Z"/>
    <path d="M1120,150 L1146,96 L1172,150 Z"/><path d="M1127,122 L1146,84 L1165,122 Z"/>
  </g>
  <!-- vorderste Bahn -->
  <path d="M0,182 C260,166 520,190 780,176 C980,166 1100,184 1200,174 L1200,200 L0,200 Z" fill="#26215C"/>
  <!-- Trittstein-Pfad zur Hütte, ein Stein fehlt -->
  <g fill="#EEEDFE">
    <ellipse cx="345" cy="192" rx="26" ry="8"/>
    <ellipse cx="418" cy="183" rx="22" ry="7"/>
    <ellipse cx="487" cy="174" rx="19" ry="6"/>
    <!-- Lücke bei 552 -->
    <ellipse cx="617" cy="158" rx="14" ry="5" fill="#CECBF6"/>
    <ellipse cx="676" cy="150" rx="12" ry="4.5" fill="#CECBF6"/>
    <ellipse cx="731" cy="143" rx="10" ry="4" fill="#CECBF6"/>
    <ellipse cx="782" cy="137" rx="8" ry="3.5" fill="#CECBF6"/>
  </g>
  <!-- der fehlende Stein schwebt golden über seiner Lücke -->
  <ellipse cx="552" cy="166" rx="17" ry="5.5" fill="none" stroke="#EEEDFE" stroke-width="2" stroke-dasharray="6 5"/>
  <ellipse cx="552" cy="140" rx="17" ry="5.5" fill="#f3c46a"/>
  <!-- zwei Vögel -->
  <path d="M418,44 q7,-7 14,0 q7,-7 14,0" stroke="#534AB7" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M466,32 q6,-6 12,0 q6,-6 12,0" stroke="#534AB7" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
