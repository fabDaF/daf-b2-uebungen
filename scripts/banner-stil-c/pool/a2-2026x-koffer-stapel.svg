<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" role="img" aria-label="Koffer werden zu einem Turm gestapelt — Satzbau">
<rect width="1200" height="200" fill="#EEEDFE"/>
<path d="M0,96 C210,78 400,104 600,92 C800,80 990,102 1200,90 L1200,200 L0,200 Z" fill="#CECBF6"/>
<!-- Kofferturm, von unten (breit) nach oben (schmal) gestapelt -->
<g stroke="#26215C" stroke-width="2">
  <!-- Koffer 1 (unten) -->
  <g transform="translate(600,150)">
    <rect x="-118" y="-24" width="236" height="48" rx="7" fill="#534AB7"/>
    <rect x="-118" y="-6" width="236" height="8" fill="#3C3489"/>
    <rect x="-14" y="-38" width="28" height="16" rx="6" fill="none" stroke="#26215C" stroke-width="4"/>
    <rect x="-96" y="-16" width="10" height="10" rx="1" fill="#AFA9EC"/>
    <rect x="86" y="-16" width="10" height="10" rx="1" fill="#AFA9EC"/>
  </g>
  <!-- Koffer 2 -->
  <g transform="translate(586,110)">
    <rect x="-96" y="-22" width="192" height="44" rx="7" fill="#7F77DD"/>
    <rect x="-96" y="-5" width="192" height="7" fill="#534AB7"/>
    <rect x="-13" y="-35" width="26" height="15" rx="6" fill="none" stroke="#26215C" stroke-width="4"/>
    <rect x="-78" y="-14" width="9" height="9" rx="1" fill="#CECBF6"/>
    <rect x="69" y="-14" width="9" height="9" rx="1" fill="#CECBF6"/>
  </g>
  <!-- Koffer 3 -->
  <g transform="translate(608,74)">
    <rect x="-74" y="-20" width="148" height="40" rx="6" fill="#AFA9EC"/>
    <rect x="-74" y="-4" width="148" height="6" fill="#7F77DD"/>
    <rect x="-12" y="-32" width="24" height="14" rx="6" fill="none" stroke="#26215C" stroke-width="4"/>
    <rect x="-58" y="-12" width="8" height="8" rx="1" fill="#534AB7"/>
    <rect x="50" y="-12" width="8" height="8" rx="1" fill="#534AB7"/>
  </g>
  <!-- Koffer 4 (oben, Bernstein-Akzent) -->
  <g transform="translate(594,42)">
    <rect x="-52" y="-17" width="104" height="34" rx="6" fill="#f3c46a"/>
    <rect x="-52" y="-3" width="104" height="5" fill="#3C3489" opacity="0.4"/>
    <rect x="-11" y="-28" width="22" height="12" rx="5" fill="none" stroke="#26215C" stroke-width="4"/>
    <rect x="-40" y="-10" width="7" height="7" rx="1" fill="#26215C"/>
    <rect x="33" y="-10" width="7" height="7" rx="1" fill="#26215C"/>
  </g>
</g>
<!-- vordere Wellen decken die Basis leicht ab -->
<path d="M0,158 C220,142 470,170 730,156 C950,144 1090,166 1200,156 L1200,200 L0,200 Z" fill="#3C3489"/>
<path d="M0,182 C250,170 510,192 770,180 C990,170 1110,188 1200,180 L1200,200 L0,200 Z" fill="#26215C"/>
</svg>
