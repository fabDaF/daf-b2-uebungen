<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" role="img" aria-label="Eine Postkarte fliegt davon, ihre Flugspur wird zur vorderen Welle — Schreiben">
<rect width="1200" height="200" fill="#EEEDFE"/>
<!-- hintere Welle -->
<path d="M0,120 C200,100 380,124 560,112 C740,100 940,120 1200,110 L1200,200 L0,200 Z" fill="#CECBF6"/>
<!-- Flugspur = zugleich die Kante der vorderen Welle (doppelboedig) -->
<path d="M0,116 C150,104 320,120 470,112 C620,104 720,110 800,104 C846,100 858,88 862,74"
      fill="none" stroke="#7F77DD" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="2 10"/>
<!-- gefuellte vordere Welle unter derselben Kante -->
<path d="M0,116 C150,104 320,120 470,112 C620,104 760,118 900,110 C1010,104 1110,116 1200,110 L1200,200 L0,200 Z" fill="#534AB7"/>
<path d="M0,116 C150,104 320,120 470,112 C620,104 760,118 900,110 C1010,104 1110,116 1200,110" fill="none" stroke="#3C3489" stroke-width="3"/>
<!-- fliegende Postkarte am oberen Ende der Spur -->
<g transform="translate(862,60) rotate(-20)">
  <rect x="-46" y="-32" width="92" height="64" rx="5" fill="#EEEDFE" stroke="#26215C" stroke-width="2.5"/>
  <line x1="-46" y1="-2" x2="46" y2="-2" stroke="#AFA9EC" stroke-width="2"/>
  <line x1="0" y1="-32" x2="0" y2="32" stroke="#AFA9EC" stroke-width="2"/>
  <!-- Briefmarke (Bernstein-Akzent) -->
  <rect x="20" y="-26" width="20" height="20" rx="1" fill="#f3c46a" stroke="#26215C" stroke-width="1.5"/>
  <!-- Adresszeilen -->
  <line x1="-38" y1="8" x2="-8" y2="8" stroke="#7F77DD" stroke-width="2.5"/>
  <line x1="-38" y1="17" x2="-14" y2="17" stroke="#7F77DD" stroke-width="2.5"/>
  <line x1="-38" y1="26" x2="-2" y2="26" stroke="#7F77DD" stroke-width="2.5"/>
</g>
<!-- dunkle vordere Wellen -->
<path d="M0,158 C230,142 480,170 740,156 C960,144 1090,166 1200,156 L1200,200 L0,200 Z" fill="#3C3489"/>
<path d="M0,182 C250,170 510,192 770,180 C990,170 1110,188 1200,180 L1200,200 L0,200 Z" fill="#26215C"/>
</svg>
